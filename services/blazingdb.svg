<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEF4FF"/>
      <stop offset="100%" stop-color="#DCEBFF"/>
    </linearGradient>

    <linearGradient id="core" x1="28" y1="24" x2="102" y2="108">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <linearGradient id="accent" x1="64" y1="36" x2="64" y2="96">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="32" fill="url(#bg)"/>

  <!-- Background grid -->
  <g opacity="0.08" stroke="#1E3A8A" stroke-width="2">
    <path d="M24 40H104"/>
    <path d="M24 64H104"/>
    <path d="M24 88H104"/>
    <path d="M40 24V104"/>
    <path d="M64 24V104"/>
    <path d="M88 24V104"/>
  </g>

  <!-- Main database symbol -->
  <g filter="url(#softShadow)">
    <ellipse cx="64" cy="40" rx="30" ry="12" fill="url(#core)"/>
    <path d="M34 40V78C34 84 47 90 64 90C81 90 94 84 94 78V40" fill="url(#core)"/>
    <ellipse cx="64" cy="78" rx="30" ry="12" fill="#4F46E5"/>
  </g>

  <!-- Lightning/data flow -->
  <path
    d="M70 26L50 62H65L58 102L82 54H66L70 26Z"
    fill="url(#accent)"
    stroke="#FFFFFF"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Top highlight -->
  <ellipse cx="64" cy="40" rx="20" ry="5" fill="#FFFFFF" opacity="0.22"/>
</svg>
