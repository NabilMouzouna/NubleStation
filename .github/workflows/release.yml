name: Release

on:
  push:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: orbit
            package: "@nublestation/orbit"
            context: .
            dockerfile: apps/orbit/Dockerfile
            image: ghcr.io/nabilmouzouna/nublestation-orbit

          - service: gateway
            package: "@nublestation/gateway"
            context: .
            dockerfile: apps/gateway/Dockerfile
            image: ghcr.io/nabilmouzouna/nublestation-gateway

          - service: blaze
            package: "@nublestation/blaze"
            context: .
            dockerfile: apps/blaze/Dockerfile
            image: ghcr.io/nabilmouzouna/nublestation-blaze

          - service: console
            package: "@nublestation/console"
            context: .
            dockerfile: apps/console/Dockerfile
            image: ghcr.io/nabilmouzouna/nublestation-console

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.image }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
