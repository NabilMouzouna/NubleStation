<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>

    <linearGradient id="deploy" x1="32" y1="24" x2="96" y2="104">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <linearGradient id="arrow" x1="64" y1="36" x2="64" y2="96">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="32" fill="url(#bg)"/>

  <!-- Infrastructure layers -->
  <g filter="url(#shadow)">
    <rect x="26" y="72" width="76" height="18" rx="9" fill="url(#deploy)" opacity="0.92"/>
    <rect x="34" y="52" width="60" height="16" rx="8" fill="url(#deploy)" opacity="0.78"/>
    <rect x="42" y="34" width="44" height="14" rx="7" fill="url(#deploy)" opacity="0.62"/>
  </g>

  <!-- Deploy arrow -->
  <path
    d="M64 26L86 52H72V86H56V52H42L64 26Z"
    fill="url(#arrow)"
    stroke="#FFFFFF"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Network nodes -->
  <g fill="#ECFDF5" opacity="0.9">
    <circle cx="42" cy="80" r="3"/>
    <circle cx="64" cy="80" r="3"/>
    <circle cx="86" cy="80" r="3"/>
  </g>
</svg>
