<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="vault-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F4FE0"/>
      <stop offset="100%" stop-color="#9B5BFF"/>
    </linearGradient>
  </defs>
  <!-- Vault body -->
  <rect x="8" y="10" width="46" height="40" rx="5" stroke="url(#vault-g)" stroke-width="3.5"/>
  <!-- Door circle -->
  <circle cx="31" cy="30" r="10" stroke="url(#vault-g)" stroke-width="3"/>
  <!-- Center lock -->
  <circle cx="31" cy="30" r="3.5" fill="url(#vault-g)"/>
  <!-- Spoke lines -->
  <line x1="31" y1="20" x2="31" y2="24" stroke="url(#vault-g)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="31" y1="36" x2="31" y2="40" stroke="url(#vault-g)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="21" y1="30" x2="25" y2="30" stroke="url(#vault-g)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="37" y1="30" x2="41" y2="30" stroke="url(#vault-g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Handle -->
  <rect x="47" y="27" width="5" height="6" rx="2" fill="url(#vault-g)"/>
  <!-- Feet -->
  <line x1="18" y1="50" x2="18" y2="56" stroke="url(#vault-g)" stroke-width="3" stroke-linecap="round"/>
  <line x1="44" y1="50" x2="44" y2="56" stroke="url(#vault-g)" stroke-width="3" stroke-linecap="round"/>
</svg>
