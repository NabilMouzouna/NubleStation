<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="16" fill="#FEF9EC"/>
  <!-- Shackle (arch), centered: peaks ~y=17, base at y=26 -->
  <path d="M21 26 C21 14 43 14 43 26" stroke="#D97706" stroke-width="3" stroke-linecap="round"/>
  <!-- Body, centered: y=24 to y=48 -->
  <rect x="15" y="24" width="34" height="24" rx="6"
    fill="#D97706" fill-opacity="0.12" stroke="#D97706" stroke-width="2.5"/>
  <!-- Keyhole -->
  <circle cx="32" cy="34" r="3.5" fill="#D97706"/>
  <rect x="30.5" y="34" width="3" height="6" rx="1.5" fill="#D97706"/>
</svg>
