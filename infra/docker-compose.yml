name: nublestation

networks:
  nuble:
    driver: bridge

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  nuble-apps:

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ORG_NAME: ${ORG_NAME}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - nuble
    depends_on:
      - console
      - api
      - orbit
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  coredns:
    image: coredns/coredns:1.11.3
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./coredns/Corefile:/Corefile:ro
    command: ["-conf", "/Corefile"]
    networks:
      - nuble

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nuble
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 5s
      retries: 3

  console:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./placeholders/console:/usr/share/nginx/html:ro
      - /var/nuble/admin.db:/app/admin.db:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nuble
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./placeholders/api:/usr/share/nginx/html:ro
    networks:
      - nuble
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  orbit:
    image: ghcr.io/nabilmouzouna/nublestation-orbit:latest
    restart: unless-stopped
    environment:
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET}
      STORAGE_ROOT: /var/nuble/apps
      PORT: 3002
      NODE_ENV: production
    volumes:
      - nuble-apps:/var/nuble/apps
    expose:
      - "3002"
    networks:
      - nuble
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3