name: nublestation

networks:
  nuble:
    driver: bridge

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  nuble-apps:

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ORG_DOMAIN: ${ORG_DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - nuble-apps:/var/nuble/apps:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - nuble
    depends_on:
      - console
      - api
      - orbit
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  coredns:
    image: coredns/coredns:1.11.3
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - /var/nuble/coredns/Corefile:/Corefile:ro
    command: ["-conf", "/Corefile"]
    networks:
      - nuble

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nuble
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── NubleStation services ────────────────────────────────────────────────────

  console:
    image: ghcr.io/nabilmouzouna/nublestation-console:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PLATFORM_DB_URL: ${DATABASE_URL}
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ORBIT_STORAGE_ROOT: /var/nuble/apps
      ORG_NAME: ${ORG_NAME}
      ORG_DOMAIN: ${ORG_DOMAIN}
      HOST_IP: ${HOST_IP}
      SECURE_COOKIES: "false"
    volumes:
      - nuble-apps:/var/nuble/apps:rw
      - ./.env:/app/.env.platform:rw
    expose:
      - "3000"
    networks:
      - nuble
    depends_on:
      postgres:
        condition: service_healthy
      blaze:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Gateway — the only LAN-exposed API service (service name "api" matches Caddy)
  api:
    image: ghcr.io/nabilmouzouna/nublestation-gateway:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET}
      DB_INTERNAL_URL: http://blaze:3001
      ORBIT_INTERNAL_URL: http://orbit:3002
      PORT: 3000
    expose:
      - "3000"
    networks:
      - nuble
    depends_on:
      postgres:
        condition: service_healthy
      blaze:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  blaze:
    image: ghcr.io/nabilmouzouna/nublestation-blaze:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET}
      PORT: 3001
    expose:
      - "3001"
    networks:
      - nuble
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  orbit:
    image: ghcr.io/nabilmouzouna/nublestation-orbit:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET}
      STORAGE_ROOT: /var/nuble/apps
      PORT: 3002
    volumes:
      - nuble-apps:/var/nuble/apps
    expose:
      - "3002"
    networks:
      - nuble
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
